<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis Project - Building Competence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        rajdhani: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            cyan: '#00f3ff',
                            purple: '#bc13fe',
                            blue: '#0b2447',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050510;
            color: #ffffff;
            /* Cyber grid background */
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(188, 19, 254, 0.05);
        }

        .text-glow-cyan {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .text-glow-purple {
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.8), 0 0 20px rgba(188, 19, 254, 0.4);
        }

        .link-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.05), rgba(188, 19, 254, 0.05));
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            border-color: rgba(0, 243, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative font-rajdhani">

    <!-- Ambient Glowing Orbs Background -->
    <div class="bg-blob w-96 h-96 bg-neon-purple top-0 left-0 animate-pulse-slow"></div>
    <div class="bg-blob w-96 h-96 bg-neon-cyan bottom-0 right-0 animate-pulse-slow" style="animation-delay: 1.5s;"></div>

    <!-- Main Container -->
    <div class="glass-card max-w-md w-full rounded-3xl p-8 relative z-10 animate-float flex flex-col items-center">
        
        <!-- Logo -->
        <div class="relative w-32 h-32 mb-6">
            <div class="absolute inset-0 rounded-full border-2 border-neon-cyan animate-spin" style="animation-duration: 10s;"></div>
            <div class="absolute inset-2 rounded-full border border-neon-purple animate-spin" style="animation-duration: 7s; animation-direction: reverse;"></div>
            <img 
                src="https://lh3.googleusercontent.com/d/1u0iBjJWfVl1QXkAPFwOZITnAZUEvVoSG" 
                alt="Logo Praxis Project" 
                class="w-full h-full object-cover rounded-full p-3 bg-white/5 backdrop-blur-sm"
                onerror="this.src='https://via.placeholder.com/150/0b2447/00f3ff?text=PRAXIS'"
            >
        </div>

        <!-- Headers -->
        <div class="text-center mb-8 w-full">
            <h1 class="font-orbitron font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-neon-cyan to-white text-glow-cyan tracking-wider mb-2">
                PRAXIS PROJECT
            </h1>
            <h2 class="text-xl font-bold text-gray-300 tracking-widest mb-1">
                Building Competence
            </h2>
            <div class="inline-block mt-2 px-4 py-1 rounded-full bg-neon-cyan/10 border border-neon-cyan/50 backdrop-blur-md hover:bg-neon-cyan/20 transition-all cursor-pointer">
                <h3 class="text-sm font-orbitron font-bold text-neon-cyan tracking-widest hover:text-white transition-colors">
                    <a href="https://amadheos.github.io/bepe/" target="_blank" rel="noopener noreferrer" class="flex items-center">
                        <i class="fas fa-user-astronaut mr-2"></i>By: Bambang Pujiarto
                    </a>
                </h3>
            </div>
        </div>

        <!-- Links List -->
        <div class="w-full space-y-4">
            
            <!-- Link 1: OBE Class -->
            <a href="/obe" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center mr-4 group-hover:bg-blue-500/40 transition-colors">
                    <i class="fas fa-sitemap text-xl text-blue-400 group-hover:text-blue-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">OBE CLASS</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

            <!-- Link 2: Deep Learning -->
            <a href="/deeplearning" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center mr-4 group-hover:bg-purple-500/40 transition-colors">
                    <i class="fas fa-brain text-xl text-purple-400 group-hover:text-purple-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">DEEP LEARNING CLASS</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

            <!-- Link 3: Vocation Class -->
            <a href="/vocation" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center mr-4 group-hover:bg-orange-500/40 transition-colors">
                    <i class="fas fa-tools text-xl text-orange-400 group-hover:text-orange-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">VOCATION CLASS</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

            <!-- Link 4: Competency -->
            <a href="/competency" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center mr-4 group-hover:bg-yellow-500/40 transition-colors">
                    <i class="fas fa-award text-xl text-yellow-400 group-hover:text-yellow-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">COMPETENCY</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

            <!-- Link 5: Prototype -->
            <a href="/prototype" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center mr-4 group-hover:bg-cyan-500/40 transition-colors">
                    <i class="fas fa-cube text-xl text-cyan-400 group-hover:text-cyan-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">PROTOTYPE</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

            <!-- Link 6: Research -->
            <a href="/research" 
               class="link-btn flex items-center w-full px-6 py-4 rounded-xl text-white group">
                <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center mr-4 group-hover:bg-green-500/40 transition-colors">
                    <i class="fas fa-microscope text-xl text-green-400 group-hover:text-green-300"></i>
                </div>
                <span class="font-bold text-lg tracking-wide group-hover:text-neon-cyan transition-colors">RESEARCH</span>
                <i class="fas fa-chevron-right ml-auto text-gray-500 group-hover:text-neon-cyan transition-colors"></i>
            </a>

        </div>

        <!-- Footer -->
        <div class="mt-8 text-center border-t border-white/10 pt-4 w-full">
            <p class="text-xs text-gray-400 font-orbitron tracking-widest">
                <a href="https://unimma.ac.id/" target="_blank" rel="noopener noreferrer" class="hover:text-white transition-colors">
                    TEKNOLOGI INFORMASI <span class="text-neon-cyan">UNIMMA</span>
                </a>
            </p>
        </div>
    </div>

</body>
</html>
